<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f46e5">
  <title>💰 Gastos</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
      background: #eef2ff; color: #1e1b4b;
      max-width: 480px; margin: 0 auto;
      min-height: 100%; overflow-x: hidden;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 52px 16px 0;
      position: sticky; top: 0; z-index: 40;
      box-shadow: 0 4px 24px rgba(79,70,229,0.35);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .nav-btn {
      background: rgba(255,255,255,0.18); border: none; border-radius: 50%;
      width: 34px; height: 34px; color: #fff; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:active { background: rgba(255,255,255,0.32); }
    .month-title { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: rgba(255,255,255,0.18); border: none; border-radius: 50%;
      width: 34px; height: 34px; color: #fff; font-size: 17px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ── Summary card ───────────────────────────── */
    .summary-card {
      background: rgba(255,255,255,0.14); backdrop-filter: blur(12px);
      border-radius: 18px 18px 0 0; margin: 0 0;
      padding: 14px 16px 0; border: 1px solid rgba(255,255,255,0.2);
      border-bottom: none;
    }
    .summary-main {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 12px;
    }
    .summary-main-left {}
    .summary-queda-label { color: rgba(255,255,255,0.72); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-queda-val { font-size: 32px; font-weight: 800; line-height: 1.1; }
    .summary-queda-val.pos { color: #a5f3fc; }
    .summary-queda-val.neg { color: #fca5a5; }
    .summary-ahorro {
      text-align: right;
    }
    .summary-ahorro-label { color: rgba(255,255,255,0.65); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .summary-ahorro-val { color: #c4b5fd; font-size: 18px; font-weight: 800; }

    .summary-chips {
      display: flex; gap: 6px; padding-bottom: 14px; overflow-x: auto;
      scrollbar-width: none;
    }
    .summary-chips::-webkit-scrollbar { display: none; }
    .chip {
      background: rgba(255,255,255,0.12); border-radius: 20px;
      padding: 7px 12px; white-space: nowrap; flex-shrink: 0;
    }
    .chip-label { color: rgba(255,255,255,0.65); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .chip-val { color: #fff; font-size: 14px; font-weight: 700; margin-top: 1px; }
    .chip-val.income { color: #86efac; }
    .chip-val.expense { color: #fca5a5; }

    /* ── Tabs ───────────────────────────────────── */
    .tabs-bar {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 0 12px 12px;
      display: flex; gap: 8px;
    }
    .tab-btn {
      flex: 1; border: none; border-radius: 12px; padding: 10px 0;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #fff; color: #4f46e5; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .tab-btn.inactive { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }

    /* ── Content ────────────────────────────────── */
    .content { flex: 1; padding: 12px 12px 110px; display: flex; flex-direction: column; gap: 8px; }

    /* ── Section header ─────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 2px 0;
    }
    .section-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .section-total { font-size: 13px; font-weight: 700; color: #4f46e5; }

    /* ── Expense item ───────────────────────────── */
    .expense-item {
      background: #fff; border-radius: 16px; padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(79,70,229,0.07);
      cursor: pointer; transition: transform 0.1s;
    }
    .expense-item:active { transform: scale(0.985); }
    .expense-emoji {
      width: 40px; height: 40px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-name { font-size: 15px; font-weight: 600; color: #1e1b4b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-cat { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .expense-amount { font-size: 15px; font-weight: 700; color: #4f46e5; white-space: nowrap; }
    .expense-del { background: none; border: none; color: #e2e8f0; font-size: 22px; cursor: pointer; padding: 2px 4px; transition: color 0.15s; line-height: 1; flex-shrink: 0; }
    .expense-del:active { color: #ef4444; }

    /* ── Fixed item ─────────────────────────────── */
    .fixed-item {
      background: #fff; border-radius: 16px; padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(79,70,229,0.07);
    }
    .fixed-icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
    }
    .fixed-info { flex: 1; }
    .fixed-name { font-size: 15px; font-weight: 600; color: #1e1b4b; }
    .fixed-sub { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .fixed-amount { font-size: 15px; font-weight: 700; color: #d97706; white-space: nowrap; }
    .fixed-edit { background: none; border: none; color: #c7d2fe; font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }

    /* ── Income items (new) ─────────────────────── */
    .income-section { display: flex; flex-direction: column; gap: 8px; }
    .income-item {
      background: #fff; border-radius: 16px; padding: 13px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(79,70,229,0.07);
    }
    .income-icon {
      width: 40px; height: 40px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
    }
    .income-icon.regular { background: linear-gradient(135deg, #d1fae5, #6ee7b7); }
    .income-icon.extra   { background: linear-gradient(135deg, #e0f2fe, #7dd3fc); }
    .income-info { flex: 1; }
    .income-label { font-size: 15px; font-weight: 600; color: #1e1b4b; }
    .income-sub { font-size: 12px; color: #94a3b8; margin-top: 1px; }
    .income-amount { font-size: 15px; font-weight: 700; color: #059669; white-space: nowrap; }
    .income-edit { background: none; border: none; color: #c7d2fe; font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; }
    .income-total-row {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border-radius: 14px; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .income-total-label { font-size: 13px; font-weight: 700; color: #065f46; }
    .income-total-val { font-size: 18px; font-weight: 800; color: #059669; }

    /* ── Add fixed btn ──────────────────────────── */
    .add-dashed-btn {
      background: none; border: 2px dashed #c7d2fe; border-radius: 14px;
      padding: 13px; color: #818cf8; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s; width: 100%;
    }
    .add-dashed-btn:active { background: #eef2ff; }

    /* ── Savings card ───────────────────────────── */
    .savings-card {
      background: linear-gradient(135deg, #f5f3ff, #ede9fe);
      border-radius: 16px; padding: 16px;
      border: 1px solid #ddd6fe;
    }
    .savings-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .savings-card-title { font-size: 13px; font-weight: 700; color: #6d28d9; text-transform: uppercase; letter-spacing: 0.5px; }
    .savings-edit-btn { background: none; border: 1px solid #c4b5fd; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: #7c3aed; cursor: pointer; }
    .savings-main { font-size: 30px; font-weight: 800; color: #4c1d95; margin-bottom: 10px; }
    .savings-breakdown { display: flex; flex-direction: column; gap: 6px; }
    .savings-row { display: flex; justify-content: space-between; font-size: 13px; }
    .savings-row-label { color: #7c3aed; }
    .savings-row-val { font-weight: 700; color: #4c1d95; }
    .savings-divider { border: none; border-top: 1px dashed #c4b5fd; margin: 4px 0; }

    /* ── FAB ────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; border: none; border-radius: 26px;
      padding: 15px 28px; font-size: 16px; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 24px rgba(79,70,229,0.45);
      display: flex; align-items: center; gap: 9px;
      z-index: 30; max-width: 340px; width: calc(100% - 48px);
      justify-content: center; white-space: nowrap;
    }
    .fab:active { opacity: 0.9; transform: translateX(-50%) scale(0.97); }

    /* ── Modal ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(15,10,40,0.6);
      z-index: 50; display: flex; align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #fff; border-radius: 28px 28px 0 0;
      width: 100%; max-width: 480px; margin: 0 auto;
      padding: 20px 20px 44px;
      max-height: 92vh; overflow-y: auto;
    }
    .modal-handle { width: 36px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 18px; }
    .modal-title { font-size: 21px; font-weight: 800; color: #1e1b4b; margin-bottom: 18px; }
    .modal-section-title { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 10px; }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; padding: 13px 14px; border: 2px solid #e2e8f0;
      border-radius: 13px; font-size: 16px; color: #1e1b4b;
      outline: none; transition: border-color 0.15s; -webkit-appearance: none;
      background: #fff;
    }
    .form-input:focus { border-color: #4f46e5; }
    .form-input.big { font-size: 22px; font-weight: 700; color: #4f46e5; }
    .form-input.green { color: #059669; }
    .form-input.purple { color: #7c3aed; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* Income source row in settings */
    .income-source-row {
      background: #f8fafc; border-radius: 13px; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .income-source-icon { font-size: 20px; }
    .income-source-inputs { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .income-source-name { font-size: 14px; font-weight: 600; color: #1e1b4b; }
    .income-source-amount-row { display: flex; align-items: center; gap: 8px; }
    .income-source-input {
      flex: 1; padding: 8px 10px; border: 2px solid #e2e8f0;
      border-radius: 10px; font-size: 16px; font-weight: 700; color: #059669;
      outline: none; -webkit-appearance: none; background: #fff;
    }
    .income-source-input:focus { border-color: #059669; }
    .income-source-del { background: none; border: none; color: #e2e8f0; font-size: 22px; cursor: pointer; padding: 2px; flex-shrink: 0; }
    .income-source-del:active { color: #ef4444; }
    .add-income-btn {
      background: none; border: 2px dashed #bbf7d0; border-radius: 13px;
      padding: 11px; color: #059669; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; width: 100%; margin-bottom: 4px;
    }
    .add-income-btn:active { background: #f0fdf4; }

    /* Cat grid */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
    .cat-btn {
      border: 2px solid #e2e8f0; border-radius: 13px; padding: 9px 4px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; background: #fff; transition: all 0.12s;
    }
    .cat-btn.sel { border-color: #4f46e5; background: #eef2ff; }
    .cat-emoji { font-size: 20px; }
    .cat-label { font-size: 10px; color: #64748b; font-weight: 600; text-align: center; }
    .cat-btn.sel .cat-label { color: #4f46e5; }

    /* Actions */
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel { flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 13px; background: #fff; font-size: 15px; font-weight: 600; color: #64748b; cursor: pointer; }
    .btn-save { flex: 2; padding: 15px; border: none; border-radius: 13px; background: linear-gradient(135deg, #4f46e5, #7c3aed); font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; }
    .btn-danger { flex: 1; padding: 15px; border: none; border-radius: 13px; background: #fee2e2; font-size: 15px; font-weight: 700; color: #ef4444; cursor: pointer; }

    /* ── Empty state ────────────────────────────── */
    .empty { text-align: center; padding: 48px 16px; }
    .empty-icon { font-size: 52px; margin-bottom: 10px; }
    .empty-title { font-size: 16px; font-weight: 700; color: #64748b; margin-bottom: 4px; }
    .empty-sub { font-size: 14px; color: #94a3b8; }

    /* ── Category backgrounds ───────────────────── */
    .bg-super       { background: linear-gradient(135deg,#dcfce7,#bbf7d0); }
    .bg-restaurante { background: linear-gradient(135deg,#fee2e2,#fecaca); }
    .bg-salud       { background: linear-gradient(135deg,#e0f2fe,#bae6fd); }
    .bg-ropa        { background: linear-gradient(135deg,#fae8ff,#e9d5ff); }
    .bg-transporte  { background: linear-gradient(135deg,#fef9c3,#fef08a); }
    .bg-ocio        { background: linear-gradient(135deg,#ffedd5,#fed7aa); }
    .bg-hogar       { background: linear-gradient(135deg,#f0fdf4,#dcfce7); }
    .bg-belleza     { background: linear-gradient(135deg,#fdf2f8,#fce7f3); }
    .bg-online      { background: linear-gradient(135deg,#eff6ff,#dbeafe); }
    .bg-delivery    { background: linear-gradient(135deg,#fff7ed,#ffedd5); }
    .bg-otros       { background: linear-gradient(135deg,#f8fafc,#f1f5f9); }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>

  { id:131, name:'Veritas',         amount:11.12,  category:'super',       date:'2026-03-26' },
  { id:132, name:'Primark Toallas', amount:3.00,   category:'hogar',       date:'2026-03-26' },
  { id:133, name:'Baño Arenas',     amount:1.00,   category:'ocio',        date:'2026-03-26' },
  { id:134, name:'Tobilleras',      amount:10.00,  category:'ropa',        date:'2026-03-26' },
];

/* ─── Helpers ───────────────────────────────── */
const fmt = n => n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const toFloat = s => parseFloat(String(s).replace(',','.')) || 0;
const newId = () => Date.now() + Math.random();
const mkKey = (y,m) => `${y}-${m}`;
const todayStr = () => new Date().toISOString().split('T')[0];

/* ─── localStorage hook ─────────────────────── */
function useStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
    catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

/* ══════════════════════════════════════════════
   MODAL: Add / Edit variable expense
═══════════════════════════════════════════════ */
function AddModal({ initial, onClose, onSave }) {
  const [name, setName]   = useState(initial?.name || '');
  const [amt,  setAmt]    = useState(initial?.amount ? String(initial.amount) : '');
  const [cat,  setCat]    = useState(initial?.category || 'otros');
  const nameRef = useRef();
  useEffect(() => { setTimeout(() => nameRef.current?.focus(), 300); }, []);

  const save = () => {
    const a = toFloat(amt);
    if (!name.trim() || a <= 0) return;
    onSave({ name:name.trim(), amount:a, category:cat, date:todayStr() });
    onClose();
  };

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-title">{initial ? '✏️ Editar gasto' : '+ Añadir gasto'}</div>

        <div className="form-group">
          <label className="form-label">Descripción</label>
          <input ref={nameRef} className="form-input" value={name}
            onChange={e=>setName(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&save()}
            placeholder="Ej: Mercadona"/>
        </div>
        <div className="form-group">
          <label className="form-label">Importe (€)</label>
          <input className="form-input big" type="number" inputMode="decimal"
            value={amt} onChange={e=>setAmt(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&save()}
            placeholder="0,00"/>
        </div>
        <div className="form-group">
          <label className="form-label">Categoría</label>
          <div className="cat-grid">
            {CATS.map(c=>(
              <button key={c.id} className={`cat-btn ${cat===c.id?'sel':''}`} onClick={()=>setCat(c.id)}>
                <span className="cat-emoji">{c.emoji}</span>
                <span className="cat-label">{c.label}</span>
              </button>
            ))}
          </div>
        </div>

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={save}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MODAL: Add / Edit fixed expense
═══════════════════════════════════════════════ */
function FixedModal({ expense, onClose, onSave, onDelete }) {
  const [name, setName] = useState(expense?.name || '');
  const [amt,  setAmt]  = useState(expense?.amount ? String(expense.amount) : '');
  const isNew = !expense?.id;

  const save = () => {
    const a = toFloat(amt);
    if (!name.trim() || a <= 0) return;
    onSave({ ...(expense||{}), id:expense?.id||newId(), name:name.trim(), amount:a });
    onClose();
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-title">{isNew ? '+ Gasto fijo' : '✏️ Editar fijo'}</div>

        <div className="form-group">
          <label className="form-label">Nombre</label>
          <input className="form-input" value={name} onChange={e=>setName(e.target.value)}
            placeholder="Ej: Netflix"/>
        </div>
        <div className="form-group">
          <label className="form-label">Importe mensual (€)</label>
          <input className="form-input big" type="number" inputMode="decimal"
            value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0,00"/>
        </div>

        <div className="modal-actions">
          {!isNew && <button className="btn-danger" onClick={()=>{onDelete(expense.id);onClose();}}>Eliminar</button>}
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={save}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MODAL: Income settings
   - Multiple salary sources with custom names
   - One extra/bonus field
═══════════════════════════════════════════════ */
function IncomeModal({ sources, onClose, onSave }) {
  const [items, setItems] = useState(
    sources.length > 0 ? sources.map(s=>({...s}))
    : [{ id:'i1', name:'Sueldo Joako', amount:'' }, { id:'i2', name:'Sueldo Esposa', amount:'' }]
  );

  const update = (id, field, val) =>
    setItems(prev => prev.map(i => i.id===id ? {...i,[field]:val} : i));
  const remove = id => setItems(prev => prev.filter(i=>i.id!==id));
  const add = () => setItems(prev => [...prev, { id:newId(), name:'Extra / Ingreso', amount:'' }]);

  const save = () => {
    const cleaned = items
      .map(i => ({ ...i, amount:toFloat(i.amount), name:i.name.trim()||'Ingreso' }))
      .filter(i => i.amount > 0);
    onSave(cleaned);
    onClose();
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-title">💰 Ingresos del mes</div>
        <p style={{fontSize:13,color:'#94a3b8',marginBottom:16}}>
          Añadí sueldos, extras, comisiones o cualquier ingreso de este mes.
        </p>

        {items.map((item, idx) => (
          <div key={item.id} className="income-source-row">
            <span className="income-source-icon">
              {idx === 0 ? '👤' : idx === 1 ? '👤' : '⭐'}
            </span>
            <div className="income-source-inputs">
              <input
                className="form-input"
                style={{padding:'8px 10px',fontSize:14,marginBottom:6}}
                value={item.name}
                onChange={e=>update(item.id,'name',e.target.value)}
                placeholder="Nombre del ingreso"/>
              <input
                className="income-source-input"
                type="number" inputMode="decimal"
                value={item.amount}
                onChange={e=>update(item.id,'amount',e.target.value)}
                placeholder="0,00"/>
            </div>
            {items.length > 1 && (
              <button className="income-source-del" onClick={()=>remove(item.id)}>×</button>
            )}
          </div>
        ))}

        <button className="add-income-btn" onClick={add}>+ Añadir ingreso / extra</button>

        <div style={{background:'#f0fdf4',borderRadius:13,padding:'12px 14px',marginTop:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:'#065f46'}}>Total ingresos</span>
            <span style={{fontSize:18,fontWeight:800,color:'#059669'}}>
              {fmt(items.reduce((s,i)=>s+toFloat(i.amount),0))}
            </span>
          </div>
        </div>

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={save}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MODAL: Savings (ahorro acumulado)
═══════════════════════════════════════════════ */
function SavingsModal({ savings, quedaMes, onClose, onSave }) {
  const [val, setVal] = useState(String(savings));

  const save = () => { onSave(toFloat(val)); onClose(); };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle"/>
        <div className="modal-title">🏦 Ahorro acumulado</div>
        <p style={{fontSize:14,color:'#64748b',marginBottom:20,lineHeight:1.5}}>
          Este es el total de ahorros que tienen hasta la fecha. Actualizalo manualmente cuando quieras.
        </p>

        <div className="form-group">
          <label className="form-label">Ahorros totales actuales (€)</label>
          <input className="form-input big purple" type="number" inputMode="decimal"
            value={val} onChange={e=>setVal(e.target.value)} placeholder="0,00"
            autoFocus/>
        </div>

        {quedaMes !== null && (
          <div style={{background:'#f5f3ff',borderRadius:13,padding:'12px 14px',marginBottom:4}}>
            <div style={{fontSize:12,color:'#7c3aed',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:6}}>
              Referencia este mes
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:14}}>
              <span style={{color:'#64748b'}}>Saldo que queda este mes</span>
              <span style={{fontWeight:700,color:quedaMes>=0?'#059669':'#ef4444'}}>{fmt(quedaMes)}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:14,marginTop:6}}>
              <span style={{color:'#64748b'}}>Si sumás el saldo</span>
              <span style={{fontWeight:700,color:'#7c3aed'}}>{fmt(toFloat(val) + Math.max(0, quedaMes))}</span>
            </div>
          </div>
        )}

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancelar</button>
          <button className="btn-save" onClick={save}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   SUMMARY CARD
═══════════════════════════════════════════════ */
function SummaryCard({ totalIncome, totalVar, totalFixed, savings, quedaMes }) {
  const quedaClass = quedaMes >= 0 ? 'pos' : 'neg';
  return (
    <div className="summary-card">
      <div className="summary-main">
        <div className="summary-main-left">
          <div className="summary-queda-label">Queda este mes</div>
          <div className={`summary-queda-val ${quedaClass}`}>{fmt(quedaMes)}</div>
        </div>
        {savings > 0 && (
          <div className="summary-ahorro">
            <div className="summary-ahorro-label">Ahorro total</div>
            <div className="summary-ahorro-val">{fmt(savings)}</div>
          </div>
        )}
      </div>
      <div className="summary-chips">
        <div className="chip">
          <div className="chip-label">💰 Ingresos</div>
          <div className="chip-val income">{fmt(totalIncome)}</div>
        </div>
        <div className="chip">
          <div className="chip-label">📊 Variables</div>
          <div className="chip-val expense">{fmt(totalVar)}</div>
        </div>
        <div className="chip">
          <div className="chip-label">📌 Fijos</div>
          <div className="chip-val expense">{fmt(totalFixed)}</div>
        </div>
        <div className="chip">
          <div className="chip-label">📋 Total gastos</div>
          <div className="chip-val expense">{fmt(totalVar + totalFixed)}</div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════
   EXPENSE ITEM
═══════════════════════════════════════════════ */
function ExpItem({ expense, onDelete, onEdit }) {
  const cat = CAT_MAP[expense.category] || CAT_MAP.otros;
  return (
    <div className="expense-item" onClick={()=>onEdit(expense)}>
      <div className={`expense-emoji bg-${cat.id}`}>{cat.emoji}</div>
      <div className="expense-info">
        <div className="expense-name">{expense.name}</div>
        <div className="expense-cat">{cat.label} · {expense.date?.slice(5).replace('-','/')}</div>
      </div>
      <div className="expense-amount">{fmt(expense.amount)}</div>
      <button className="expense-del" onClick={e=>{e.stopPropagation();onDelete(expense.id);}}>×</button>
    </div>
  );
}

/* ══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function App() {
  const today = new Date();
  const [curYear,  setCurYear]  = useState(today.getFullYear());
  const [curMonth, setCurMonth] = useState(today.getMonth());
  const [tab, setTab]           = useState('variables'); // 'variables'|'fijos'|'ingresos'|'ahorro'

  // Modals
  const [showAdd,     setShowAdd]     = useState(false);
  const [editExp,     setEditExp]     = useState(null);
  const [editFixed,   setEditFixed]   = useState(null);
  const [addFixed,    setAddFixed]    = useState(false);
  const [showIncome,  setShowIncome]  = useState(false);
  const [showSavings, setShowSavings] = useState(false);

  // Persisted state
  const [fixedExpenses, setFixedExpenses] = useStorage('gastos-fixed', DEFAULT_FIXED);
  const [monthsData,    setMonthsData]    = useStorage('gastos-months', {
    '2026-2': {
      incomeSources: [
        { id:'i1', name:'Sueldo Joako',  amount:1553.33 },
        { id:'i2', name:'Sueldo Esposa', amount:1553.33 },
      ],
      savings: 3507.23,
      expenses: MARZO_2026,
    }
  });

  const key = mkKey(curYear, curMonth);
  const md  = monthsData[key] || { incomeSources:[], savings:0, expenses:[] };

  const totalFixed  = fixedExpenses.reduce((s,e) => s + e.amount, 0);
  const totalVar    = md.expenses.reduce((s,e) => s + e.amount, 0);
  const totalIncome = (md.incomeSources||[]).reduce((s,i) => s + i.amount, 0);
  const quedaMes    = totalIncome - totalFixed - totalVar;

  /* URL params for Shortcuts / automation */
  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    const amt = p.get('amount'), name = p.get('name'), cat = p.get('cat');
    if (amt) { setEditExp({ name:name||'', amount:parseFloat(amt)||0, category:cat||'otros', _auto:true }); setShowAdd(true); }
  }, []);

  const updateMd = useCallback(patch => {
    setMonthsData(prev => ({ ...prev, [key]: { ...md, ...patch } }));
  }, [key, md]);

  const prevMonth = () => { if(curMonth===0){setCurMonth(11);setCurYear(y=>y-1);}else setCurMonth(m=>m-1); };
  const nextMonth = () => { if(curMonth===11){setCurMonth(0);setCurYear(y=>y+1);}else setCurMonth(m=>m+1); };

  const addExpense  = exp => updateMd({ expenses:[{...exp, id:newId()}, ...md.expenses] });
  const saveEditExp = upd => updateMd({ expenses: md.expenses.map(e=>e.id===upd.id?{...e,...upd}:e) });
  const delExpense  = id  => updateMd({ expenses: md.expenses.filter(e=>e.id!==id) });

  const saveFixed   = exp => setFixedExpenses(prev => {
    const idx = prev.findIndex(e=>e.id===exp.id);
    return idx===-1 ? [...prev,exp] : prev.map(e=>e.id===exp.id?exp:e);
  });
  const delFixed    = id  => setFixedExpenses(prev => prev.filter(e=>e.id!==id));

  return (
    <div style={{display:'flex',flexDirection:'column',minHeight:'100vh'}}>

      {/* ── HEADER ── */}
      <div className="header">
        <div className="header-top">
          <div className="month-nav">
            <button className="nav-btn" onClick={prevMonth}>‹</button>
            <div className="month-title">{MONTHS[curMonth]} {curYear}</div>
            <button className="nav-btn" onClick={nextMonth}>›</button>
          </div>
          <div className="header-actions">
            <button className="icon-btn" title="Ingresos" onClick={()=>setShowIncome(true)}>💰</button>
            <button className="icon-btn" title="Ahorro"   onClick={()=>setShowSavings(true)}>🏦</button>
          </div>
        </div>
        <SummaryCard totalIncome={totalIncome} totalVar={totalVar}
          totalFixed={totalFixed} savings={md.savings} quedaMes={quedaMes}/>
        <div className="tabs-bar">
          <button className={`tab-btn ${tab==='variables'?'active':'inactive'}`} onClick={()=>setTab('variables')}>
            📊 Variables ({md.expenses.length})
          </button>
          <button className={`tab-btn ${tab==='fijos'?'active':'inactive'}`} onClick={()=>setTab('fijos')}>
            📌 Fijos ({fixedExpenses.length})
          </button>
          <button className={`tab-btn ${tab==='ingresos'?'active':'inactive'}`} onClick={()=>setTab('ingresos')}>
            💰 Ingresos
          </button>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div className="content">

        {/* TAB: Variables */}
        {tab==='variables' && <>
          <div className="section-header">
            <span className="section-title">Gastos variables</span>
            <span className="section-total">{fmt(totalVar)}</span>
          </div>
          {md.expenses.length===0 ? (
            <div className="empty">
              <div className="empty-icon">🧾</div>
              <div className="empty-title">Sin gastos este mes</div>
              <div className="empty-sub">Pulsá el botón de abajo para añadir</div>
            </div>
          ) : md.expenses.map(e=>(
            <ExpItem key={e.id} expense={e} onDelete={delExpense}
              onEdit={exp=>{setEditExp(exp);setShowAdd(true);}}/>
          ))}
        </>}

        {/* TAB: Fijos */}
        {tab==='fijos' && <>
          <div className="section-header">
            <span className="section-title">Gastos fijos mensuales</span>
            <span className="section-total">{fmt(totalFixed)}</span>
          </div>
          {fixedExpenses.map(e=>(
            <div key={e.id} className="fixed-item">
              <div className="fixed-icon">{fixedIcon(e.name)}</div>
              <div className="fixed-info">
                <div className="fixed-name">{e.name}</div>
                <div className="fixed-sub">Se repite cada mes</div>
              </div>
              <div className="fixed-amount">{fmt(e.amount)}</div>
              <button className="fixed-edit" onClick={()=>setEditFixed(e)}>✎</button>
            </div>
          ))}
          <button className="add-dashed-btn" onClick={()=>setAddFixed(true)}>+ Añadir gasto fijo</button>
        </>}

        {/* TAB: Ingresos */}
        {tab==='ingresos' && <>
          <div className="section-header">
            <span className="section-title">Ingresos de {MONTHS[curMonth]}</span>
            <span className="section-total" style={{color:'#059669'}}>{fmt(totalIncome)}</span>
          </div>
          {(md.incomeSources||[]).length===0 ? (
            <div className="empty">
              <div className="empty-icon">💸</div>
              <div className="empty-title">Sin ingresos configurados</div>
              <div className="empty-sub">Pulsá el 💰 arriba para añadir sueldos</div>
            </div>
          ) : (md.incomeSources||[]).map((src,idx)=>(
            <div key={src.id} className="income-item">
              <div className={`income-icon ${idx<2?'regular':'extra'}`}>
                {idx===0?'👤':idx===1?'👤':'⭐'}
              </div>
              <div className="income-info">
                <div className="income-label">{src.name}</div>
                <div className="income-sub">{idx>=2?'Ingreso extra':'Sueldo mensual'}</div>
              </div>
              <div className="income-amount">{fmt(src.amount)}</div>
            </div>
          ))}
          {(md.incomeSources||[]).length>0 && (
            <div className="income-total-row">
              <span className="income-total-label">Total ingresos</span>
              <span className="income-total-val">{fmt(totalIncome)}</span>
            </div>
          )}
          <button className="add-dashed-btn" style={{borderColor:'#bbf7d0',color:'#059669'}}
            onClick={()=>setShowIncome(true)}>
            ✏️ Editar ingresos
          </button>

          {/* Savings summary in income tab */}
          <div style={{marginTop:8}} className="savings-card">
            <div className="savings-card-header">
              <span className="savings-card-title">🏦 Ahorro acumulado</span>
              <button className="savings-edit-btn" onClick={()=>setShowSavings(true)}>Editar</button>
            </div>
            <div className="savings-main">{fmt(md.savings)}</div>
            <div className="savings-breakdown">
              <div className="savings-row">
                <span className="savings-row-label">Saldo este mes</span>
                <span className="savings-row-val" style={{color:quedaMes>=0?'#059669':'#ef4444'}}>{fmt(quedaMes)}</span>
              </div>
              <hr className="savings-divider"/>
              <div className="savings-row">
                <span className="savings-row-label">Si sumás el saldo del mes</span>
                <span className="savings-row-val">{fmt(md.savings + Math.max(0, quedaMes))}</span>
              </div>
            </div>
          </div>
        </>}
      </div>

      {/* ── FAB ── */}
      {tab==='variables' && (
        <button className="fab" onClick={()=>{setEditExp(null);setShowAdd(true);}}>
          + Añadir gasto
        </button>
      )}
      {tab==='fijos' && (
        <button className="fab" onClick={()=>setAddFixed(true)}>
          + Añadir fijo
        </button>
      )}
      {tab==='ingresos' && (
        <button className="fab" onClick={()=>setShowIncome(true)}>
          💰 Editar ingresos
        </button>
      )}

      {/* ── MODALS ── */}
      {showAdd && (
        <AddModal
          initial={editExp}
          onClose={()=>{setShowAdd(false);setEditExp(null);}}
          onSave={exp => {
            if (editExp && !editExp._auto) saveEditExp({...editExp,...exp});
            else addExpense(exp);
          }}
        />
      )}
      {(editFixed || addFixed) && (
        <FixedModal
          expense={addFixed ? null : editFixed}
          onClose={()=>{setEditFixed(null);setAddFixed(false);}}
          onSave={saveFixed}
          onDelete={delFixed}
        />
      )}
      {showIncome && (
        <IncomeModal
          sources={md.incomeSources||[]}
          onClose={()=>setShowIncome(false)}
          onSave={src=>updateMd({incomeSources:src})}
        />
      )}
      {showSavings && (
        <SavingsModal
          savings={md.savings}
          quedaMes={quedaMes}
          onClose={()=>setShowSavings(false)}
          onSave={s=>updateMd({savings:s})}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
